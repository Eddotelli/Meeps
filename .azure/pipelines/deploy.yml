# =====================================
# Azure DevOps Pipeline – Meeps BFF
# =====================================
# Builds and deploys ASP.NET Core API + Blazor WASM together

trigger:
  - master

pool:
  vmImage: "ubuntu-latest"

variables:
  buildConfiguration: "Release"
  testConfiguration: "Debug"
  dotnetVersion: "9.0.x"
  apiProjectPath: "API/API.csproj"

steps:
  # =====================
  # Setup .NET SDK
  # =====================
  - task: UseDotNet@2
    displayName: "Install .NET 9"
    inputs:
      packageType: "sdk"
      version: "$(dotnetVersion)"

  # =====================
  # Restore dependencies
  # =====================
  - task: DotNetCoreCLI@2
    displayName: "Restore NuGet packages"
    inputs:
      command: "restore"
      projects: "$(apiProjectPath)"

  # =====================
  # EF CORE TOOLING
  # Required to run migrations in pipeline
  # =====================
  - task: DotNetCoreCLI@2
    displayName: "Install EF Core tools"
    inputs:
      command: "custom"
      custom: "tool"
      arguments: "install --global dotnet-ef --version 9.0.*"

  # =====================
  # BUILD
  # Builds both API + Blazor WASM (BFF)
  # =====================
  - task: DotNetCoreCLI@2
    displayName: "Build API + Client (BFF)"
    inputs:
      command: "build"
      projects: "$(apiProjectPath)"
      arguments: "--configuration $(buildConfiguration) --no-restore"

  # =====================
  # RUN TESTS
  # Tests run in Debug configuration to include test endpoints
  # =====================
  - task: DotNetCoreCLI@2
    displayName: "Run Unit and Integration Tests"
    inputs:
      command: "test"
      projects: "**/*Tests.csproj"
      arguments: '--configuration $(testConfiguration) --logger trx --collect "Code Coverage"'
    continueOnError: false

  # =====================
  # DATABASE MIGRATION
  # Runs before deployment
  # Stops the pipeline if something goes wrong
  # =====================
  - task: DotNetCoreCLI@2
    displayName: "Apply Database Migrations"
    inputs:
      command: "custom"
      custom: "ef"
      arguments: "database update --project API/API.csproj --configuration $(buildConfiguration) --no-build"
    env:
      ConnectionStrings__DefaultConnection: $(AzureSqlConnectionString)
      ASPNETCORE_ENVIRONMENT: "Production"
    continueOnError: false

  # =====================
  # PUBLISH
  # Packages the app into a deployable artifact
  # =====================
  - task: DotNetCoreCLI@2
    displayName: "Publish API + Client"
    inputs:
      command: "publish"
      projects: "$(apiProjectPath)"
      arguments: "--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory) --no-build"
      publishWebProjects: false
      zipAfterPublish: true

  # =====================
  # DEPLOY
  # Deploys the zip artifact to Azure App Service
  # =====================
  - task: AzureWebApp@1
    displayName: "Deploy to Azure App Service"
    inputs:
      azureSubscription: "Azure-Meeps-Deploy"
      appType: "webApp"
      appName: "meeps"
      package: "$(Build.ArtifactStagingDirectory)/**/*.zip"
      deploymentMethod: "auto"
